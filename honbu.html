<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>在庫カウント 本部用</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#222;font-size:14px}
header{background:#1A1A18;color:#fff;padding:14px 20px;font-size:16px;font-weight:700;letter-spacing:1px}
.wrap{max-width:960px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:8px;padding:18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card h2{font-size:14px;font-weight:700;border-bottom:2px solid #1A1A18;padding-bottom:8px;margin-bottom:14px}
.drop-zone{border:2px dashed #bbb;border-radius:6px;padding:18px;text-align:center;cursor:pointer;background:#fafafa;transition:.2s}
.drop-zone:hover{border-color:#1A1A18;background:#f5f5f5}
.drop-zone input{display:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.st{font-size:12px;margin-top:6px;color:#666}
.st.ok{color:#2e7d32;font-weight:700}
.st.er{color:#c62828;font-weight:700}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.btn-dark{background:#1A1A18;color:#fff}
.btn-dark:hover{background:#333}
.btn-green{background:#2e7d32;color:#fff}
.btn-green:hover{background:#1b5e20}
.btn-gray{background:#e0e0e0;color:#333}
.btn-gray:hover{background:#bdbdbd}
.btn-sm{padding:6px 14px;font-size:12px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.row input[type=text],.row input[type=password]{flex:1;min-width:200px;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px}
.info{background:#e8f4fd;border-left:4px solid #1976d2;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:12px}
.warn{background:#fff8e1;border-left:4px solid #f9a825;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:12px}
.new-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #eee}
.new-item span{flex:1}
.new-item select{padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:13px}
/* 並び替え */
.sort-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sort-tab{padding:6px 16px;border:2px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:.2s}
.sort-tab.active{border-color:#1A1A18;background:#1A1A18;color:#fff}
.sort-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.locked-badge{font-size:12px;color:#2e7d32;font-weight:600;background:#e8f5e9;padding:3px 10px;border-radius:10px}
.sort-ul{list-style:none;border:1px solid #e0e0e0;border-radius:6px;max-height:420px;overflow-y:auto}
.sort-li{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #f0f0f0;background:#fff;user-select:none}
.sort-li:last-child{border-bottom:none}
.sort-li:nth-child(even){background:#fafafa}
.sort-li.dragging{opacity:.3;background:#e3f2fd}
.sort-li.over{border-top:2px solid #1976d2}
.handle{cursor:grab;color:#bbb;font-size:18px;flex-shrink:0}
.handle:active{cursor:grabbing}
.inum{color:#aaa;font-size:12px;width:26px;text-align:right;flex-shrink:0}
.iname{flex:1;font-size:13px}
.istate{font-size:11px;color:#888;background:#f0f0f0;padding:2px 7px;border-radius:10px}
</style>
</head>
<body>
<header>📦 在庫カウント 本部用</header>
<div class="wrap">

<!-- ① CSV読み込み -->
<div class="card">
  <h2>① マスター・在庫CSVを読み込む</h2>
  <div class="grid2">
    <div>
      <div class="drop-zone" onclick="document.getElementById('fMaster').click()">
        <input type="file" id="fMaster" accept=".csv">
        <div>📋 マスターCSV</div>
        <div class="st" id="stMaster">クリックして選択</div>
      </div>
      <div style="margin-top:8px;text-align:center">
        <button class="btn btn-gray btn-sm" onclick="downloadMaster()">📥 マスターCSVをダウンロード</button>
      </div>
    </div>
    <div>
      <div class="drop-zone" onclick="document.getElementById('fStock').click()">
        <input type="file" id="fStock" accept=".csv" multiple>
        <div>📊 在庫CSV（複数選択OK）</div>
        <div class="st" id="stStock">クリックして選択</div>
      </div>
    </div>
  </div>
  <div id="newItemWrap" style="display:none;margin-top:14px">
    <div class="warn">⚠️ 新規商品が検出されました。カテゴリを設定してください。</div>
    <div id="newItemList"></div>
    <button class="btn btn-dark btn-sm" style="margin-top:8px" onclick="confirmNew()">✅ カテゴリを確定</button>
  </div>
</div>

<!-- ② GAS URL -->
<div class="card">
  <h2>② GAS URL設定</h2>
  <div class="row">
    <input type="text" id="inGas" placeholder="https://script.google.com/macros/s/...">
    <button class="btn btn-gray btn-sm" onclick="saveGas()">💾 保存</button>
    <span class="st" id="stGas"></span>
  </div>
</div>

<!-- ③ 並び順 -->
<div class="card" id="secSort" style="display:none">
  <h2>③ 商品の並び順を設定（営業所ごと）</h2>
  <div class="info">営業所タブを選んでドラッグ＆ドロップで並び替え。「🔒 固定」すると次回CSVを読み込んでもこの順番が維持されます。</div>
  <div class="sort-tabs" id="sortTabs"></div>
  <div class="sort-ctrl">
    <button class="btn btn-dark btn-sm" id="btnLock" onclick="doLock()">🔒 並び順を固定</button>
    <button class="btn btn-gray btn-sm" id="btnEdit" onclick="doEdit()" style="display:none">✏️ 並び順を変更</button>
    <span class="locked-badge" id="lockBadge" style="display:none">🔒 固定済み</span>
  </div>
  <ul class="sort-ul" id="sortUl"></ul>
</div>

<!-- ④ GitHub -->
<div class="card" id="secUpload" style="display:none">
  <h2>④ GitHubにアップロード（現場へ配布）</h2>
  <div class="info">GitHubユーザー名: <strong>kawasakifamilia1121-byte</strong> / リポジトリ: <strong>zaiko-count</strong></div>
  <div class="row" style="margin-bottom:8px">
    <input type="password" id="inToken" placeholder="ghp_...">
    <button class="btn btn-gray btn-sm" onclick="saveToken()">💾 保存</button>
  </div>
  <button class="btn btn-green" onclick="doUpload()">🚀 GitHubにアップロード</button>
  <div class="st" id="stUpload" style="margin-top:8px"></div>
</div>

</div>
<script>
var GH_USER = 'kawasakifamilia1121-byte';
var GH_REPO = 'zaiko-count';
var OFFICES = ['福岡1','福岡2','広島1','広島2','四国','南九州'];
var OFFICE_MAP = {
  '福岡':'福岡1','広島':'広島1',
  '福岡1':'福岡1','福岡2':'福岡2',
  '広島1':'広島1','広島2':'広島2',
  '四国':'四国','南九州':'南九州'
};
var CATS = ['家電（新品）','家電（中古）','家具（新品）','家具（中古）',
            '布団・カーテン（新品）','布団・カーテン（中古）','その他'];

var master = {};
var stockByOffice = {};
var newItems = [];
var sortOrders = {};
var sortLocked = {};
var curOffice = '';
var dragSrc = null;

// 初期化
(function(){
  try { master = JSON.parse(localStorage.getItem('master_v3') || '{}'); } catch(e) {}
  if (Object.keys(master).length) {
    document.getElementById('stMaster').textContent = '✓ 保存済み ' + Object.keys(master).length + '件（自動読込）';
    document.getElementById('stMaster').className = 'st ok';
  }
  try {
    var o = JSON.parse(localStorage.getItem('sortOrder_v3') || '{}');
    sortOrders = o.orders || {};
    sortLocked = o.locked || {};
  } catch(e) {}
  var g = localStorage.getItem('gasUrl_v3') || '';
  if (g) document.getElementById('inGas').value = g;
  var t = localStorage.getItem('ghToken_v3') || '';
  if (t) document.getElementById('inToken').value = t;
})();

// CSV解析
function parseCSV(text) {
  var lines = text.trim().split(/\r?\n/);
  var headers = splitLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cols = splitLine(lines[i]);
    var obj = {};
    headers.forEach(function(h, j) { obj[h] = (cols[j] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function splitLine(line) {
  var res = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { res.push(cur.replace(/^"|"$/g,'')); cur = ''; }
    else { cur += c; }
  }
  res.push(cur.replace(/^"|"$/g,''));
  return res;
}

function readText(file, cb) {
  var r = new FileReader();
  r.onload = function(e) { cb(e.target.result); };
  r.readAsText(file, 'UTF-8');
}

// マスターCSV読み込み
document.getElementById('fMaster').addEventListener('change', function(e) {
  var f = e.target.files[0];
  if (!f) return;
  readText(f, function(text) {
    var rows = parseCSV(text);
    master = {};
    rows.forEach(function(r) {
      var vals = Object.values(r);
      var hinban = r['品番'] || vals[0] || '';
      var name   = r['商品名'] || vals[1] || '';
      var state  = r['商品状態'] || vals[2] || '';
      var cat    = r['種別'] || vals[3] || '';
      if (!name) return;
      master[name + '|' + state] = {hinban:hinban, name:name, state:state, category:cat};
    });
    localStorage.setItem('master_v3', JSON.stringify(master));
    document.getElementById('stMaster').textContent = '✓ ' + Object.keys(master).length + '件読み込み済み';
    document.getElementById('stMaster').className = 'st ok';
  });
});

function downloadMaster() {
  var rows = ['\uFEFF品番,商品名,商品状態,種別'];
  Object.values(master).forEach(function(m) {
    rows.push([m.hinban,m.name,m.state,m.category].map(function(v){ return '"'+(v||'')+'"'; }).join(','));
  });
  var blob = new Blob([rows.join('\n')], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'master_' + today() + '.csv';
  a.click();
}

// 在庫CSV読み込み
document.getElementById('fStock').addEventListener('change', function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  stockByOffice = {};
  var done = 0;
  files.forEach(function(f) {
    readText(f, function(text) {
      var rows = parseCSV(text);
      rows.forEach(function(r) {
        // ヘッダー名で確実に取得（列順に依存しない）
        var keys = Object.keys(r);
        var rawOffice = r['倉庫'] || r[keys[0]] || '';
        var office = OFFICE_MAP[rawOffice] || rawOffice;
        if (OFFICES.indexOf(office) < 0) return;
        var name  = r['商品名'] || r[keys[1]] || '';
        var state = r['商品状態'] || r[keys[2]] || '';
        var kind  = r['種別'] || r[keys[3]] || '';
        if (kind !== '在庫') return;
        // E列（index=4）のヘッダーが日付でも数値を取得
        var coreKey = keys[4] || '';
        var core = parseInt(r[coreKey]) || 0;
        if (!name) return;
        var mkey = name + '|' + state;
        var mdata = master[mkey] || {};
        if (!stockByOffice[office]) stockByOffice[office] = [];
        stockByOffice[office].push({
          hinban: mdata.hinban || '',
          name: name,
          state: state,
          category: mdata.category || '',
          core: core
        });
      });
      done++;
      if (done === files.length) {
        var offices = Object.keys(stockByOffice);
        document.getElementById('stStock').textContent = '✓ ' + files.length + 'ファイル / ' + offices.length + '営業所';
        document.getElementById('stStock').className = offices.length > 0 ? 'st ok' : 'st er';
        checkNew();
        if (offices.length > 0) {
          document.getElementById('secSort').style.display = '';
          document.getElementById('secUpload').style.display = '';
          initSortTabs(offices);
        }
      }
    });
  });
});

// 新規商品チェック
function checkNew() {
  newItems = [];
  var seen = {};
  Object.values(stockByOffice).forEach(function(items) {
    items.forEach(function(item) {
      var k = item.name + '|' + item.state;
      if (!item.category && !seen[k]) { seen[k] = 1; newItems.push({name:item.name, state:item.state}); }
    });
  });
  if (newItems.length) {
    var html = newItems.map(function(it, i) {
      return '<div class="new-item"><span>' + it.name + ' ' + it.state + '</span>' +
        '<select id="nc_' + i + '">' + CATS.map(function(c){ return '<option>' + c + '</option>'; }).join('') + '</select></div>';
    }).join('');
    document.getElementById('newItemList').innerHTML = html;
    document.getElementById('newItemWrap').style.display = '';
  } else {
    document.getElementById('newItemWrap').style.display = 'none';
  }
}

function confirmNew() {
  newItems.forEach(function(it, i) {
    var sel = document.getElementById('nc_' + i);
    var cat = sel ? sel.value : '';
    var k = it.name + '|' + it.state;
    master[k] = {hinban:'', name:it.name, state:it.state, category:cat};
    Object.values(stockByOffice).forEach(function(items) {
      items.forEach(function(item) {
        if (item.name === it.name && item.state === it.state) item.category = cat;
      });
    });
  });
  localStorage.setItem('master_v3', JSON.stringify(master));
  document.getElementById('newItemWrap').style.display = 'none';
  alert('✅ カテゴリを確定しました');
}

// GAS保存
function saveGas() {
  var v = document.getElementById('inGas').value.trim();
  localStorage.setItem('gasUrl_v3', v);
  document.getElementById('stGas').textContent = '✓ 保存しました';
  document.getElementById('stGas').className = 'st ok';
}

function saveToken() {
  localStorage.setItem('ghToken_v3', document.getElementById('inToken').value.trim());
  alert('✅ トークンを保存しました');
}

// ===== 並び替え =====
function initSortTabs(offices) {
  var tabsEl = document.getElementById('sortTabs');
  tabsEl.innerHTML = offices.map(function(o) {
    return '<button class="sort-tab" onclick="switchTab(\'' + o + '\')" data-o="' + o + '">' + o + '</button>';
  }).join('');
  switchTab(offices[0]);
}

function switchTab(office) {
  curOffice = office;
  document.querySelectorAll('.sort-tab').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-o') === office);
  });
  var locked = sortLocked[office] || false;
  document.getElementById('btnLock').style.display = locked ? 'none' : '';
  document.getElementById('btnEdit').style.display = locked ? '' : 'none';
  document.getElementById('lockBadge').style.display = locked ? '' : 'none';
  renderSortList(office);
}

function getOrderedItems(office) {
  var items = (stockByOffice[office] || []).slice();
  var order = sortOrders[office];
  if (!order || !order.length) return items;
  var map = {};
  items.forEach(function(it) { map[it.name + '|' + it.state] = it; });
  var result = [];
  order.forEach(function(k) { if (map[k]) { result.push(map[k]); delete map[k]; } });
  Object.keys(map).forEach(function(k) { result.push(map[k]); });
  return result;
}

function renderSortList(office) {
  var items = getOrderedItems(office);
  var locked = sortLocked[office] || false;
  var ul = document.getElementById('sortUl');
  ul.innerHTML = '';
  items.forEach(function(it, i) {
    var li = document.createElement('li');
    li.className = 'sort-li';
    li.setAttribute('data-key', it.name + '|' + it.state);
    if (!locked) li.setAttribute('draggable', 'true');
    li.innerHTML = (locked ? '<span style="width:22px;display:inline-block"></span>' : '<span class="handle">⠿</span>') +
      '<span class="inum">' + (i+1) + '</span>' +
      '<span class="iname">' + it.name + '</span>' +
      '<span class="istate">' + it.state + '</span>';
    if (!locked) {
      li.addEventListener('dragstart', onDragStart);
      li.addEventListener('dragover', onDragOver);
      li.addEventListener('drop', onDrop);
      li.addEventListener('dragend', onDragEnd);
    }
    ul.appendChild(li);
  });
}

function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.sort-li').forEach(function(x) { x.classList.remove('over'); });
  this.classList.add('over');
}

function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;
  var ul = document.getElementById('sortUl');
  var els = Array.from(ul.children);
  var si = els.indexOf(dragSrc);
  var ti = els.indexOf(this);
  if (si < ti) ul.insertBefore(dragSrc, this.nextSibling);
  else ul.insertBefore(dragSrc, this);
  Array.from(ul.children).forEach(function(x, j) {
    x.querySelector('.inum').textContent = j + 1;
    x.classList.remove('over');
  });
  saveOrder();
}

function onDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('.sort-li').forEach(function(x) { x.classList.remove('over'); });
  dragSrc = null;
}

function saveOrder() {
  var keys = Array.from(document.getElementById('sortUl').children).map(function(el) {
    return el.getAttribute('data-key');
  });
  sortOrders[curOffice] = keys;
  localStorage.setItem('sortOrder_v3', JSON.stringify({orders:sortOrders, locked:sortLocked}));
}

function doLock() {
  saveOrder();
  sortLocked[curOffice] = true;
  localStorage.setItem('sortOrder_v3', JSON.stringify({orders:sortOrders, locked:sortLocked}));
  switchTab(curOffice);
}

function doEdit() {
  sortLocked[curOffice] = false;
  localStorage.setItem('sortOrder_v3', JSON.stringify({orders:sortOrders, locked:sortLocked}));
  switchTab(curOffice);
}

// ===== GitHubアップロード =====
async function doUpload() {
  var token = document.getElementById('inToken').value.trim() || localStorage.getItem('ghToken_v3') || '';
  if (!token) { alert('GitHubトークンを入力してください'); return; }
  var offices = Object.keys(stockByOffice);
  if (!offices.length) { alert('在庫CSVを先に読み込んでください'); return; }
  var gasUrl = document.getElementById('inGas').value.trim() || localStorage.getItem('gasUrl_v3') || '';
  var stEl = document.getElementById('stUpload');
  stEl.textContent = 'アップロード中...';
  stEl.className = 'st';

  // GASにシート初期化送信
  if (gasUrl) {
    for (var i = 0; i < offices.length; i++) {
      var off = offices[i];
      var initItems = getOrderedItems(off).map(function(it) {
        return {hinban:it.hinban||'', name:it.name, state:it.state, category:it.category||'', core:it.core||0};
      });
      try {
        await fetch(gasUrl, {
          method: 'POST', mode: 'no-cors',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({action:'initSheet', office:off, items:initItems})
        });
      } catch(e) {}
    }
  }

  // GitHubにJSONアップロード
  var errors = [];
  for (var j = 0; j < offices.length; j++) {
    var office = offices[j];
    var payload = {
      office: office,
      gasUrl: gasUrl,
      items: getOrderedItems(office).map(function(it) {
        return {hinban:it.hinban||'', name:it.name, state:it.state, category:it.category||'', core:it.core||0};
      })
    };
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    var path = 'data/' + office + '.json';
    var apiUrl = 'https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/contents/' + encodeURIComponent(path);
    try {
      var sha = null;
      try {
        var getRes = await fetch(apiUrl, {headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});
        if (getRes.ok) { var d = await getRes.json(); sha = d.sha; }
      } catch(e2) {}
      var body = {message:'Update '+office, content:content};
      if (sha) body.sha = sha;
      var putRes = await fetch(apiUrl, {
        method: 'PUT',
        headers: {'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
        body: JSON.stringify(body)
      });
      if (!putRes.ok) {
        var ed = await putRes.json();
        errors.push(office + ':' + (ed.message || putRes.status));
      }
    } catch(e3) {
      errors.push(office + ':通信エラー');
    }
  }

  if (errors.length) {
    stEl.textContent = '⚠️ エラー: ' + errors.join(', ');
    stEl.className = 'st er';
  } else {
    stEl.textContent = '✅ ' + offices.length + '営業所をアップロードしました！';
    stEl.className = 'st ok';
  }
}

function today() {
  var d = new Date();
  return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
}
</script>
</body>
</html>
