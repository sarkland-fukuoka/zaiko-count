<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫カウント 本部用</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
h1{background:#1A1A18;color:#fff;padding:14px 20px;font-size:16px;letter-spacing:1px}
.container{max-width:900px;margin:0 auto;padding:16px}
.section{background:#fff;border-radius:8px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.section h2{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #1A1A18;display:flex;align-items:center;gap:6px}
.upload-area{border:2px dashed #ccc;border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:.2s;background:#fafafa}
.upload-area:hover{border-color:#1A1A18;background:#f5f5f5}
.upload-area input{display:none}
.status{font-size:12px;color:#666;margin-top:6px}
.status.ok{color:#2e7d32;font-weight:600}
.status.err{color:#c62828;font-weight:600}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.btn-primary{background:#1A1A18;color:#fff}
.btn-primary:hover{background:#333}
.btn-secondary{background:#e0e0e0;color:#333}
.btn-secondary:hover{background:#bdbdbd}
.btn-green{background:#2e7d32;color:#fff}
.btn-green:hover{background:#1b5e20}
.btn-sm{padding:5px 12px;font-size:12px}
.info-box{background:#e8f4fd;border-left:4px solid #1976d2;padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:10px}
/* 並び替えタブ */
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tab-btn{padding:6px 14px;border:2px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:.2s}
.tab-btn.active{border-color:#1A1A18;background:#1A1A18;color:#fff}
/* ドラッグリスト */
.sort-list{list-style:none;max-height:400px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:6px}
.sort-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f0f0f0;background:#fff;gap:10px;cursor:default}
.sort-item:last-child{border-bottom:none}
.sort-item:nth-child(even){background:#fafafa}
.sort-item.dragging{opacity:.4;background:#e3f2fd}
.sort-item.drag-over{border-top:2px solid #1976d2}
.drag-handle{cursor:grab;color:#aaa;font-size:18px;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.item-num{color:#aaa;font-size:12px;width:28px;flex-shrink:0;text-align:right}
.item-name{flex:1;font-size:13px}
.item-state{font-size:11px;color:#888;background:#f5f5f5;padding:2px 6px;border-radius:10px}
.sort-controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.lock-badge{font-size:12px;color:#2e7d32;font-weight:600;background:#e8f5e9;padding:4px 10px;border-radius:12px}
/* 集計テーブル */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1A1A18;color:#fff;padding:8px;text-align:left}
td{padding:7px 8px;border-bottom:1px solid #eee}
tr:nth-child(even) td{background:#f9f9f9}
.match{color:#2e7d32;font-weight:700}
.over{color:#1565c0;font-weight:700}
.under{color:#c62828;font-weight:700}
/* GAS設定 */
.gas-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.gas-row input{flex:1;min-width:200px;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<h1>📦 在庫カウント 本部用</h1>
<div class="container">

<!-- ① CSV読み込み -->
<div class="section">
  <h2>① マスター・在庫CSVを読み込む</h2>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div>
      <div class="upload-area" onclick="document.getElementById('masterFile').click()">
        <input type="file" id="masterFile" accept=".csv">
        <div>📋 マスターCSV</div>
        <div class="status" id="masterStatus">クリックして選択</div>
      </div>
    </div>
    <div>
      <div class="upload-area" onclick="document.getElementById('stockFile').click()">
        <input type="file" id="stockFile" accept=".csv" multiple>
        <div>📊 在庫CSV（複数選択OK）</div>
        <div class="status" id="stockStatus">クリックして選択</div>
      </div>
    </div>
  </div>
  <div id="newItemSection" style="display:none;margin-top:12px">
    <div class="info-box">⚠️ 新規商品が検出されました。カテゴリを設定してください。</div>
    <div id="newItemList"></div>
    <button class="btn btn-primary" style="margin-top:8px" onclick="confirmNewItems()">✅ カテゴリを確定</button>
  </div>
</div>

<!-- ② GAS設定 -->
<div class="section">
  <h2>② GAS URL設定</h2>
  <div class="gas-row">
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/..." value="">
    <button class="btn btn-secondary btn-sm" onclick="saveGasUrl()">💾 保存</button>
    <span id="gasStatus" class="status"></span>
  </div>
</div>

<!-- ③ 並び順設定 -->
<div class="section" id="sortSection" style="display:none">
  <h2>③ 商品の並び順を設定</h2>
  <div class="info-box">各営業所のタブを選択し、ドラッグ＆ドロップで並び替えてください。「固定」ボタンで確定すると次回も保持されます。</div>
  <div class="tabs" id="sortTabs"></div>
  <div class="sort-controls">
    <button class="btn btn-primary btn-sm" id="lockBtn" onclick="lockOrder()">🔒 並び順を固定</button>
    <button class="btn btn-secondary btn-sm" id="editBtn" onclick="editOrder()" style="display:none">✏️ 並び順を変更</button>
    <span id="lockBadge" style="display:none" class="lock-badge">🔒 固定済み</span>
  </div>
  <ul class="sort-list" id="sortList"></ul>
</div>

<!-- ④ GitHubアップロード -->
<div class="section" id="uploadSection" style="display:none">
  <h2>④ GitHubにアップロード（現場へ配布）</h2>
  <div class="info-box">
    GitHubユーザー名: <strong>kawasakifamilia1121-byte</strong> / リポジトリ: <strong>zaiko-count</strong>
  </div>
  <div style="margin-bottom:10px">
    <label style="font-size:12px;color:#666">GitHubトークン</label><br>
    <div class="gas-row">
      <input type="password" id="ghToken" placeholder="ghp_..." value="">
      <button class="btn btn-secondary btn-sm" onclick="saveToken()">💾 保存</button>
    </div>
  </div>
  <button class="btn btn-green" onclick="uploadToGitHub()">🚀 GitHubにアップロード</button>
  <div id="uploadStatus" class="status" style="margin-top:8px"></div>
</div>

</div><!-- /container -->

<script>
// ===== 定数 =====
const GH_USER = 'kawasakifamilia1121-byte';
const GH_REPO = 'zaiko-count';
const OFFICES = ['福岡1','福岡2','広島1','広島2','四国','南九州'];
const OFFICE_MAP = {'福岡':'福岡1','広島':'広島1','四国':'四国','南九州':'南九州','福岡1':'福岡1','福岡2':'福岡2','広島1':'広島1','広島2':'広島2'};
const CATEGORIES = ['家電（新品）','家電（中古）','家具（新品）','家具（中古）','布団・カーテン（新品）','布団・カーテン（中古）','その他'];
const ORDER_KEY = 'sortOrder_v2';
const MASTER_KEY = 'masterData_v2';

// ===== 状態 =====
var masterData = {};      // {品番+商品名: {hinban, name, state, category}}
var stockByOffice = {};   // {office: [{hinban,name,state,category,core}]}
var newItems = [];
var newItemSettings = {};
var sortOrders = {};      // {office: [key,...]}
var sortLocked = {};      // {office: bool}
var currentSortOffice = '';
var dragSrc = null;

// ===== 初期化 =====
(function init() {
  var saved = localStorage.getItem(MASTER_KEY);
  if (saved) { try { masterData = JSON.parse(saved); } catch(e){} }

  var savedOrder = localStorage.getItem(ORDER_KEY);
  if (savedOrder) { try { var o = JSON.parse(savedOrder); sortOrders = o.orders||{}; sortLocked = o.locked||{}; } catch(e){} }

  var gasUrl = localStorage.getItem('gasUrl_v2');
  if (gasUrl) document.getElementById('gasUrl').value = gasUrl;

  var token = localStorage.getItem('ghToken_v2');
  if (token) document.getElementById('ghToken').value = token;
})();

// ===== CSV解析 =====
function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/"/g,''); });
  return lines.slice(1).map(function(line) {
    var cols = splitCSVLine(line);
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = (cols[i]||'').replace(/"/g,'').trim(); });
    return obj;
  });
}

function splitCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

// ===== マスターCSV読み込み =====
document.getElementById('masterFile').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var rows = parseCSV(ev.target.result);
    masterData = {};
    rows.forEach(function(r) {
      var hinban = r['品番'] || r[Object.keys(r)[0]] || '';
      var name = r['商品名'] || r[Object.keys(r)[1]] || '';
      var state = r['商品状態'] || r[Object.keys(r)[2]] || '';
      var category = r['種別'] || r[Object.keys(r)[3]] || '';
      if (hinban && name) {
        var key = hinban + '|' + name;
        masterData[key] = {hinban:hinban, name:name, state:state, category:category};
      }
    });
    localStorage.setItem(MASTER_KEY, JSON.stringify(masterData));
    document.getElementById('masterStatus').textContent = '✓ ' + Object.keys(masterData).length + '件読み込み済み';
    document.getElementById('masterStatus').className = 'status ok';
  };
  reader.readAsText(file, 'UTF-8');
});

// ===== 在庫CSV読み込み =====
document.getElementById('stockFile').addEventListener('change', function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  stockByOffice = {};
  var loaded = 0;

  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var rows = parseCSV(ev.target.result);
      rows.forEach(function(r) {
        var rawOffice = r['倉庫'] || r[Object.keys(r)[0]] || '';
        var office = OFFICE_MAP[rawOffice] || rawOffice;
        if (!OFFICES.includes(office)) return;
        var name = r['商品名'] || r[Object.keys(r)[1]] || '';
        var state = r['商品状態'] || r['種別2'] || '';
        var kind = r['種別'] || '';
        if (kind !== '在庫') return;
        var vals = Object.values(r);
        var core = parseInt(vals[4]) || 0;

        if (!stockByOffice[office]) stockByOffice[office] = [];
        var key = name;
        stockByOffice[office].push({hinban:'', name:name, state:state, category:'', core:core, key:key});
      });

      loaded++;
      if (loaded === files.length) {
        matchWithMaster();
        document.getElementById('stockStatus').textContent = '✓ ' + files.length + 'ファイル / ' + Object.keys(stockByOffice).length + '営業所';
        document.getElementById('stockStatus').className = 'status ok';
        checkNewItems();
        initSortSection();
        document.getElementById('uploadSection').style.display = '';
      }
    };
    reader.readAsText(file, 'UTF-8');
  });
});

function matchWithMaster() {
  Object.keys(stockByOffice).forEach(function(office) {
    stockByOffice[office].forEach(function(item) {
      Object.keys(masterData).forEach(function(mkey) {
        var m = masterData[mkey];
        if (m.name === item.name && m.state === item.state) {
          item.hinban = m.hinban;
          item.category = m.category;
        }
      });
    });
  });
}

function checkNewItems() {
  newItems = [];
  Object.keys(stockByOffice).forEach(function(office) {
    stockByOffice[office].forEach(function(item) {
      if (!item.category) {
        var exists = newItems.some(function(n){ return n.name === item.name && n.state === item.state; });
        if (!exists) newItems.push({name:item.name, state:item.state});
      }
    });
  });

  if (newItems.length > 0) {
    var html = newItems.map(function(item, i) {
      return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eee">' +
        '<span style="flex:1">' + item.name + ' ' + item.state + '</span>' +
        '<select id="newcat_' + i + '" style="padding:4px;border:1px solid #ccc;border-radius:4px">' +
        CATEGORIES.map(function(c){ return '<option>' + c + '</option>'; }).join('') +
        '</select></div>';
    }).join('');
    document.getElementById('newItemList').innerHTML = html;
    document.getElementById('newItemSection').style.display = '';
  } else {
    document.getElementById('newItemSection').style.display = 'none';
  }
}

function confirmNewItems() {
  newItems.forEach(function(item, i) {
    var sel = document.getElementById('newcat_' + i);
    var cat = sel ? sel.value : '';
    var key = '|' + item.name;
    masterData[key] = {hinban:'', name:item.name, state:item.state, category:cat};
    Object.keys(stockByOffice).forEach(function(office) {
      stockByOffice[office].forEach(function(si) {
        if (si.name === item.name && si.state === item.state) si.category = cat;
      });
    });
  });
  localStorage.setItem(MASTER_KEY, JSON.stringify(masterData));
  document.getElementById('newItemSection').style.display = 'none';
  alert('✅ カテゴリを設定しました');
}

// ===== ③ 並び順設定 =====
function initSortSection() {
  var offices = Object.keys(stockByOffice);
  if (!offices.length) return;

  document.getElementById('sortSection').style.display = '';

  // タブ生成
  var tabsEl = document.getElementById('sortTabs');
  tabsEl.innerHTML = offices.map(function(o) {
    return '<button class="tab-btn" data-office="' + o + '" onclick="switchSortTab(\'' + o + '\')">' + o + '</button>';
  }).join('');

  // 最初のタブを選択
  switchSortTab(offices[0]);
}

function switchSortTab(office) {
  currentSortOffice = office;
  // タブのアクティブ状態
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-office') === office);
  });

  // ロック状態を反映
  var locked = sortLocked[office] || false;
  document.getElementById('lockBtn').style.display = locked ? 'none' : '';
  document.getElementById('editBtn').style.display = locked ? '' : 'none';
  document.getElementById('lockBadge').style.display = locked ? '' : 'none';

  renderSortList(office);
}

function getOrderedItems(office) {
  var items = stockByOffice[office] || [];
  var order = sortOrders[office];
  if (!order || !order.length) return items;

  var keyMap = {};
  items.forEach(function(item) { keyMap[item.name + '|' + item.state] = item; });

  var result = [];
  order.forEach(function(k) { if (keyMap[k]) { result.push(keyMap[k]); delete keyMap[k]; } });
  Object.values(keyMap).forEach(function(item) { result.push(item); });
  return result;
}

function renderSortList(office) {
  var items = getOrderedItems(office);
  var locked = sortLocked[office] || false;
  var list = document.getElementById('sortList');

  list.innerHTML = items.map(function(item, i) {
    var k = item.name + '|' + item.state;
    var handleHtml = locked
      ? '<span style="width:24px;display:inline-block"></span>'
      : '<span class="drag-handle" title="ドラッグして並び替え">⠿</span>';
    return '<li class="sort-item" data-key="' + k + '" data-office="' + office + '" ' +
      (locked ? '' : 'draggable="true"') + '>' +
      handleHtml +
      '<span class="item-num">' + (i+1) + '</span>' +
      '<span class="item-name">' + item.name + '</span>' +
      '<span class="item-state">' + item.state + '</span>' +
      '</li>';
  }).join('');

  if (!locked) {
    list.querySelectorAll('.sort-item').forEach(function(el) {
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragover', onDragOver);
      el.addEventListener('drop', onDrop);
      el.addEventListener('dragend', onDragEnd);
    });
  }
}

function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.sort-item').forEach(function(el) { el.classList.remove('drag-over'); });
  this.classList.add('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;
  var list = document.getElementById('sortList');
  var items = Array.from(list.children);
  var srcIdx = items.indexOf(dragSrc);
  var tgtIdx = items.indexOf(this);
  if (srcIdx < tgtIdx) { list.insertBefore(dragSrc, this.nextSibling); }
  else { list.insertBefore(dragSrc, this); }

  // 番号を更新
  Array.from(list.children).forEach(function(el, i) {
    el.querySelector('.item-num').textContent = i+1;
    el.classList.remove('drag-over');
  });
  saveCurrentOrder();
}

function onDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('.sort-item').forEach(function(el) { el.classList.remove('drag-over'); });
  dragSrc = null;
}

function saveCurrentOrder() {
  var list = document.getElementById('sortList');
  var keys = Array.from(list.children).map(function(el) { return el.getAttribute('data-key'); });
  sortOrders[currentSortOffice] = keys;
  persistOrders();
}

function lockOrder() {
  saveCurrentOrder();
  sortLocked[currentSortOffice] = true;
  persistOrders();
  switchSortTab(currentSortOffice);
}

function editOrder() {
  sortLocked[currentSortOffice] = false;
  persistOrders();
  switchSortTab(currentSortOffice);
}

function persistOrders() {
  localStorage.setItem(ORDER_KEY, JSON.stringify({orders:sortOrders, locked:sortLocked}));
}

// ===== GAS設定 =====
function saveGasUrl() {
  var url = document.getElementById('gasUrl').value.trim();
  localStorage.setItem('gasUrl_v2', url);
  document.getElementById('gasStatus').textContent = '✓ 保存しました';
  document.getElementById('gasStatus').className = 'status ok';
}

function saveToken() {
  var token = document.getElementById('ghToken').value.trim();
  localStorage.setItem('ghToken_v2', token);
  alert('✅ トークンを保存しました');
}

// ===== GitHub アップロード =====
function buildJsonForOffice(office) {
  var items = getOrderedItems(office);
  var gasUrl = document.getElementById('gasUrl').value.trim() || localStorage.getItem('gasUrl_v2') || '';
  return JSON.stringify({office:office, gasUrl:gasUrl, items:items.map(function(item) {
    return {hinban:item.hinban||'', name:item.name, state:item.state, category:item.category||'', core:item.core||0};
  })});
}

async function uploadToGitHub() {
  var token = document.getElementById('ghToken').value.trim() || localStorage.getItem('ghToken_v2') || '';
  if (!token) { alert('GitHubトークンを入力してください'); return; }

  var offices = Object.keys(stockByOffice);
  if (!offices.length) { alert('在庫CSVを先に読み込んでください'); return; }

  var statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = 'アップロード中...';
  statusEl.className = 'status';

  var gasUrl = document.getElementById('gasUrl').value.trim() || localStorage.getItem('gasUrl_v2') || '';

  // GASにシート初期化を送信
  if (gasUrl) {
    for (var i = 0; i < offices.length; i++) {
      var office = offices[i];
      var items = getOrderedItems(office);
      try {
        await fetch(gasUrl, {
          method:'POST',
          mode:'no-cors',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'initSheet', office:office, items:items.map(function(it) {
            return {hinban:it.hinban||'', name:it.name, state:it.state, category:it.category||'', core:it.core||0};
          })})
        });
      } catch(e) { console.log('GAS送信エラー', e); }
    }
  }

  // GitHubにJSONをアップロード
  var errors = [];
  for (var j = 0; j < offices.length; j++) {
    var off = offices[j];
    var content = buildJsonForOffice(off);
    var encoded = btoa(unescape(encodeURIComponent(content)));
    var path = 'data/' + off + '.json';
    var url = 'https://api.github.com/repos/' + GH_USER + '/' + GH_REPO + '/contents/' + path;

    try {
      // 既存ファイルのSHAを取得
      var sha = null;
      try {
        var getRes = await fetch(url, {headers:{'Authorization':'token ' + token, 'Accept':'application/vnd.github.v3+json'}});
        if (getRes.ok) { var d = await getRes.json(); sha = d.sha; }
      } catch(e2) {}

      var body = {message:'Update ' + off + ' data', content:encoded};
      if (sha) body.sha = sha;

      var putRes = await fetch(url, {
        method:'PUT',
        headers:{'Authorization':'token ' + token, 'Content-Type':'application/json', 'Accept':'application/vnd.github.v3+json'},
        body:JSON.stringify(body)
      });

      if (!putRes.ok) { var errData = await putRes.json(); errors.push(off + ': ' + (errData.message||putRes.status)); }
    } catch(e3) { errors.push(off + ': 通信エラー'); }
  }

  if (errors.length) {
    statusEl.textContent = '⚠️ 一部エラー: ' + errors.join(', ');
    statusEl.className = 'status err';
  } else {
    statusEl.textContent = '✅ ' + offices.length + '営業所のデータをアップロードしました！';
    statusEl.className = 'status ok';
  }
}
</script>
</body>
</html>
