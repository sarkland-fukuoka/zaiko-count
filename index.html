<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>在庫カウント</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F7F4;--surface:#FFFFFF;--border:#E8E6E0;--border2:#D0CEC8;
  --text:#1A1A18;--text2:#6B6962;--text3:#A8A49E;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-text:#633806;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{padding:.75rem 1rem;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;}
.header h1{font-size:14px;font-weight:600;}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.office-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-sm);background:var(--blue-bg);color:var(--blue-text);margin-left:6px;vertical-align:middle;}
.date-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);background:var(--bg);color:var(--text3);margin-left:4px;vertical-align:middle;}
.progress-sticky{position:sticky;top:46px;z-index:19;background:var(--surface);border-bottom:0.5px solid var(--border);padding:.5rem 1rem;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prog-label{font-size:12px;color:var(--text2);font-weight:500;}
.prog-count{font-size:12px;color:var(--green);font-weight:600;}
.prog-bar-out{height:4px;background:var(--border);border-radius:2px;}
.prog-bar-in{height:4px;background:var(--green);border-radius:2px;transition:width .3s;}
.sync-status{font-size:11px;margin-top:4px;}
.sync-ok{color:var(--green);}
.sync-err{color:var(--red);}
.sync-ing{color:var(--text3);}
.wrap{max-width:480px;margin:0 auto;padding:1rem;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
h2{font-size:16px;font-weight:600;margin-bottom:4px;}
.sub{font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.5;}
.btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:.75rem;display:block;text-align:center;}
.btn-primary{background:var(--text);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border2);}
.btn-green{background:var(--green);color:#fff;}
.err{background:var(--red-bg);color:var(--red-text);border-radius:var(--radius-sm);padding:.75rem;font-size:13px;margin-top:.5rem;}
.ok-box{background:var(--green-bg);border:0.5px solid var(--green);border-radius:var(--radius-sm);padding:.75rem 1rem;font-size:13px;color:var(--green-text);}
.resume-box{background:var(--blue-bg);border:0.5px solid var(--blue);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;}
.resume-title{font-size:14px;font-weight:600;color:var(--blue-text);margin-bottom:4px;}
.resume-sub{font-size:12px;color:var(--blue);margin-bottom:.75rem;}
.resume-btns{display:flex;gap:8px;}
.resume-btns button{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;}
.rbtn-yes{background:var(--blue);color:#fff;}
.rbtn-no{background:transparent;color:var(--blue-text);border:0.5px solid var(--blue)!important;}
/* 営業所ボタン */
.office-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:1rem;}
.office-btn{width:100%;padding:16px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;}
.office-btn:active{opacity:.7;}
.office-btn .office-icon{font-size:24px;}
.office-btn .office-name{font-size:14px;font-weight:600;color:var(--text);}
.office-btn.fukuoka{border-top:3px solid #185FA5;}
.office-btn.fukuoka2{border-top:3px solid #5B9BD5;}
.office-btn.hiroshima{border-top:3px solid #EF9F27;}
.office-btn.hiroshima2{border-top:3px solid #C47A0A;}
.office-btn.shikoku{border-top:3px solid #1D9E75;}
.office-btn.minamikyu{border-top:3px solid #A32D2D;}
/* ローディング */
.loading-box{text-align:center;padding:2rem 1rem;}
.loading-icon{font-size:40px;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2);margin-top:1rem;}
/* カテゴリ */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem;}
.cat-btn{width:100%;padding:18px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);font-size:14px;font-weight:600;color:var(--text);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.cat-btn:active{opacity:.7;}
.cat-btn .csb{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin-top:2px;}
.cat-btn.shinpin .csb{background:var(--blue-bg);color:var(--blue-text);}
.cat-btn.chuko .csb{background:var(--amber-bg);color:var(--amber-text);}
.cat-btn.denki{border-top:3px solid var(--blue);}
.cat-btn.kagu{border-top:3px solid var(--green);}
.cat-btn.futon{border-top:3px solid #EF9F27;}
.cat-done{font-size:11px;font-weight:600;color:var(--green);}
.cat-count{font-size:11px;color:var(--text3);}
.cat-clear-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:var(--radius-sm);border:0.5px solid var(--red);background:#fff;color:var(--red);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1;}
.cat-clear-btn:active{opacity:.7;}
/* 商品リスト */
.item-list{display:flex;flex-direction:column;gap:10px;padding:1rem;}
.item-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.item-card.counted{border-color:var(--green);}
.item-card.counted-diff{border-color:var(--red);}
.ich{padding:12px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;user-select:none;}
.ii{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:600;line-height:1.3;}
.item-meta{font-size:11px;color:var(--text3);margin-top:3px;}
.item-hinban{font-family:monospace;background:var(--bg);padding:1px 6px;border-radius:3px;}
.ir{text-align:right;flex-shrink:0;margin-left:10px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.cls{font-size:10px;color:var(--text3);}
.cv{font-size:20px;font-weight:700;filter:blur(6px);transition:filter .3s;}
.cv.revealed{filter:none;}
.rb{font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--radius-sm);}
.rok{background:var(--green-bg);color:var(--green-text);}
.rover{background:var(--blue-bg);color:var(--blue-text);}
.rshort{background:var(--red-bg);color:var(--red-text);}
.rpend{font-size:11px;color:var(--text3);}
.iia{padding:0 14px 14px;display:none;}
.iia.open{display:block;}
.idv{height:.5px;background:var(--border);margin-bottom:12px;}
.cnt-input{width:100%;height:72px;font-size:44px;font-weight:700;text-align:center;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:monospace;}
.cnt-input:focus{outline:none;border-color:var(--green);}
.cbr{display:flex;gap:10px;margin-top:10px;}
.cb{flex:1;height:52px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;}
.cb:active{opacity:.6;}
.cb.plus{background:var(--text);color:#fff;border-color:var(--text);}
.ab{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;}
.ab.disabled{opacity:.25;cursor:default;}
.note-input{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);resize:none;font-family:inherit;margin-top:8px;}
.ji{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);margin-top:8px;}
.ji.ok{background:var(--green-bg);}
.ji.over{background:var(--blue-bg);}
.ji.short{background:var(--red-bg);}
.jm{font-size:28px;animation:popIn .3s ease;}
.jt{font-size:13px;font-weight:600;}
.jt.ok{color:var(--green-text);}
.jt.over{color:var(--blue-text);}
.jt.short{color:var(--red-text);}
@keyframes popIn{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);padding:.75rem 1rem;display:flex;gap:8px;z-index:20;}
.bottom-bar button{flex:1;padding:11px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;}
.bb-save{background:var(--green);color:#fff;}
.bb-done{background:var(--text);color:#fff;}
.bb-back{background:transparent;color:var(--text2);border:0.5px solid var(--border2)!important;}
/* 集計 */
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem;}
.mc{background:var(--bg);border-radius:var(--radius-sm);padding:.75rem;text-align:center;}
.mv{font-size:22px;font-weight:700;}
.mv.red{color:var(--red);}
.mv.green{color:var(--green);}
.mv.blue{color:var(--blue);}
.ml{font-size:11px;color:var(--text3);margin-top:2px;}
.stw{overflow-x:auto;border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-top:.5rem;}
.st{width:100%;border-collapse:collapse;font-size:12px;min-width:300px;}
.st th{background:var(--bg);color:var(--text2);font-weight:600;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap;}
.st td{padding:8px 10px;border-bottom:0.5px solid var(--border);color:var(--text);}
.st tr:last-child td{border-bottom:none;}
.st tr.rok td{background:#EAF3DE18;}
.st tr.rsh td{background:#FCEBEB18;}
.st tr.rov td{background:#E6F1FB18;}
.db{font-size:11px;padding:2px 7px;border-radius:var(--radius-sm);font-weight:600;}
.dok{background:var(--green-bg);color:var(--green-text);}
.dover{background:var(--blue-bg);color:var(--blue-text);}
.dshort{background:var(--red-bg);color:var(--red-text);}
/* 一覧表示 */
.list-table{width:100%;border-collapse:collapse;}
.list-row{display:flex;align-items:center;padding:11px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;background:var(--surface);gap:10px;}
.list-row:active{background:var(--bg);}
.list-row.done-ok{background:#EAF3DE22;border-left:3px solid var(--green);}
.list-row.done-over{background:#E6F1FB22;border-left:3px solid var(--blue);}
.list-row.done-short{background:#FCEBEB22;border-left:3px solid var(--red);}
.list-num{font-size:11px;color:var(--text3);width:20px;flex-shrink:0;text-align:right;}
.list-name{flex:1;min-width:0;}
.list-item-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item-meta{font-size:11px;color:var(--text3);margin-top:1px;}
.list-status{flex-shrink:0;text-align:right;}
.list-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:var(--radius-sm);}
.list-pend{font-size:12px;color:var(--text3);}
.list-arrow{font-size:14px;color:var(--text3);margin-left:4px;flex-shrink:0;}
/* カウント入力画面 */
.count-screen{padding:1rem;}
.count-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:1rem;font-weight:600;}
.count-back:active{opacity:.7;}
.count-nav{display:flex;gap:8px;margin-top:1rem;}
.count-nav button{flex:1;padding:11px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);}
.count-nav button:active{opacity:.7;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:999;animation:fadeInOut 2.2s ease forwards;white-space:nowrap;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="header">
  <h1>在庫カウント<span class="office-badge" id="office-badge" style="display:none"></span><span class="date-badge" id="date-badge" style="display:none"></span></h1>
  <div class="header-sub" id="header-sub">営業所を選択してください</div>
</div>
<div id="progress-sticky" style="display:none;" class="progress-sticky">
  <div class="prog-row"><span class="prog-label" id="prog-label"></span><span class="prog-count" id="prog-count"></span></div>
  <div class="prog-bar-out"><div class="prog-bar-in" id="prog-bar" style="width:0%"></div></div>
  <div class="sync-status" id="sync-status"></div>
</div>
<div id="app" class="wrap"></div>
<div id="bottom-bar" style="display:none;" class="bottom-bar">
  <button class="bb-back" id="bb-back">← 担当選択</button>
  <button class="bb-save" id="bb-save">💾 保存</button>
  <button class="bb-done" id="bb-done">集計へ →</button>
</div>

<script>
// ===== 設定 =====
const GAS_URL='https://script.google.com/macros/s/AKfycbwdMcLiTAaZaf6Zt-3IK4sqk95nEkliUZpO9_lf1tmaPVduCBVX0pmXIrAHGRgmYgdBLw/exec';
const GITHUB_USER='kawasakifamilia1121-byte';
const GITHUB_REPO='zaiko-count';
const GITHUB_BRANCH='main';

const OFFICES=[
  {key:'福岡1',name:'福岡1',icon:'🏢',cls:'fukuoka'},
  {key:'福岡2',name:'福岡2',icon:'🏢',cls:'fukuoka2'},
  {key:'広島1',name:'広島1',icon:'🏢',cls:'hiroshima'},
  {key:'広島2',name:'広島2',icon:'🏢',cls:'hiroshima2'},
  {key:'四国', name:'四国', icon:'🏢',cls:'shikoku'},
  {key:'南九州',name:'南九州',icon:'🏢',cls:'minamikyu'},
];
const SAVE_KEY='genba_save_v2';
const CAT_DEFS=[
  {key:'家電_新品',label:'家電',status:'新品',cc:'denki shinpin'},
  {key:'家電_中古',label:'家電',status:'中古',cc:'denki chuko'},
  {key:'家具_新品',label:'家具',status:'新品',cc:'kagu shinpin'},
  {key:'家具_中古',label:'家具',status:'中古',cc:'kagu chuko'},
  {key:'布団・カーテン_新品',label:'布団・カーテン',status:'新品',cc:'futon shinpin'},
  {key:'布団・カーテン_中古',label:'布団・カーテン',status:'中古',cc:'futon chuko'},
];
// 南九州用：新品・中古混在カテゴリ
const CAT_DEFS_MIXED=[
  {key:'家電_混在',label:'家電',status:'',cc:'denki shinpin',mixed:true},
  {key:'家具_混在',label:'家具',status:'',cc:'kagu shinpin',mixed:true},
  {key:'布団・カーテン_混在',label:'布団・カーテン',status:'',cc:'futon shinpin',mixed:true},
];
function getOfficeCatDefs(office){
  return (office==='南九州')?CAT_DEFS_MIXED:CAT_DEFS;
}

let currentOffice=null,currentDate='',allItems=[],counts={},notes={};
let currentCatDef=null,currentCatItems=[];
let syncTimer=null; // リアルタイム同期タイマー

function hs(s){document.getElementById('header-sub').textContent=s;}
function sob(name){const b=document.getElementById('office-badge');if(name){b.textContent=name;b.style.display='inline-block';}else b.style.display='none';}
function sdb(d){const b=document.getElementById('date-badge');if(d){b.textContent=d;b.style.display='inline-block';}else b.style.display='none';}
function sp(label,done,total){
  const el=document.getElementById('progress-sticky');if(!el)return;
  if(!total){el.style.display='none';return;}
  el.style.display='block';
  document.getElementById('prog-label').textContent=label;
  document.getElementById('prog-count').textContent=`${done} / ${total}件完了`;
  document.getElementById('prog-bar').style.width=`${Math.round(done/total*100)}%`;
}
function sss(msg,type){const el=document.getElementById('sync-status');if(el){el.className=`sync-status sync-${type}`;el.textContent=msg;}}
function sbb(show){const bb=document.getElementById('bottom-bar');if(bb)bb.style.display=show?'flex':'none';}
function toast(msg){const o=document.querySelector('.toast');if(o)o.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove();},2300);}

// ===== 営業所別データ保存 =====
function officeKey(offKey){return `genba_${offKey}`;}
function saveOfficeData(offKey,data){try{localStorage.setItem(officeKey(offKey),JSON.stringify(data));}catch(e){}}
function loadOfficeData2(offKey){try{const s=localStorage.getItem(officeKey(offKey));return s?JSON.parse(s):null;}catch(e){return null;}}
function clearOfficeData(offKey){try{localStorage.removeItem(officeKey(offKey));}catch(e){}}

function saveP(){
  if(!currentOffice)return;
  saveOfficeData(currentOffice.key,{office:currentOffice.key,date:currentDate,allItems,counts,notes,catKey:currentCatDef?.key,savedAt:new Date().toISOString()});
  toast('💾 保存しました');
}
function loadSave(){
  // 後方互換のため旧キーも確認
  if(currentOffice){
    const d=loadOfficeData2(currentOffice.key);
    if(d)return d;
  }
  try{const s=localStorage.getItem(SAVE_KEY);return s?JSON.parse(s):null;}catch(e){return null;}
}
function clearSave(){
  if(currentOffice)clearOfficeData(currentOffice.key);
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
}

// ===== リアルタイム同期（30秒ごとにGASから取得） =====
async function fetchResultsFromGAS(){
  if(!currentOffice||!GAS_URL)return;
  try{
    const url=`${GAS_URL}?action=getResults&office=${encodeURIComponent(currentOffice.name)}&t=${Date.now()}`;
    const res=await fetch(url);
    if(!res.ok)return;
    const data=await res.json();
    if(data.status!=='ok'||!data.results?.length)return;
    // 他の人がカウントした分をマージ（自分のカウントは上書きしない）
    let updated=false;
    data.results.forEach(r=>{
      const g=allItems.findIndex(a=>a.name===r.name&&a.status===r.status);
      if(g<0)return;
      if(counts[g]===undefined&&r.real!==''&&r.real!==null&&r.real!==undefined){
        counts[g]=Number(r.real);
        if(r.memo)notes[g]=r.memo;
        updated=true;
      }
    });
    if(updated){
      saveOfficeData(currentOffice.key,{office:currentOffice.key,date:currentDate,allItems,counts,notes,catKey:currentCatDef?.key,savedAt:new Date().toISOString()});
      // 一覧画面を再描画
      const listEl=document.querySelector('.list-row');
      if(listEl)renderList();
      sss('🔄 他の担当者のカウントを取得しました','ok');
      setTimeout(()=>sss('✓ リアルタイム同期中','ok'),3000);
    }
  }catch(e){}
}

function startSync(){
  stopSync();
  fetchResultsFromGAS(); // 即座に1回取得
  syncTimer=setInterval(fetchResultsFromGAS,30000); // 30秒ごと
  sss('✓ リアルタイム同期中','ok');
}
function stopSync(){
  if(syncTimer){clearInterval(syncTimer);syncTimer=null;}
}

// GitHubからデータ取得
async function fetchOfficeData(officeKey){
  const fileName=`data/${encodeURIComponent(officeKey)}.json`;
  const url=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${fileName}`;
  const res=await fetch(url+'?t='+Date.now());
  if(!res.ok)throw new Error('データが見つかりません。本部がまだアップロードしていない可能性があります。');
  return await res.json();
}

// GASへ送信（no-cors対応）
async function syncToGAS(items){
  if(!GAS_URL)return;
  sss('📡 送信中...','ing');
  try{
    const payload={action:'saveResult',office:currentOffice.name,items:items.map(it=>{
      const g=allItems.indexOf(it);
      return{hinban:it.hinban,name:it.name,status:it.status,cat:it.cat,core:it.core,real:counts[g]??null,memo:notes[g]||''};
    })};
    await fetch(GAS_URL,{
      method:'POST',
      body:JSON.stringify(payload),
      headers:{'Content-Type':'text/plain'},
      mode:'no-cors'
    });
    sss('✓ スプレッドシートに送信済み','ok');
  }catch(e){sss('⚠ 送信失敗（オフライン？）','err');}
}

// ===== 画面1：営業所選択 =====
function renderOfficeSelect(){
  currentOffice=null;sob('');sdb('');hs('営業所を選択してください');sp('',0,0);sbb(false);
  const saved=loadSave();
  let resumeHtml='';
  if(saved?.allItems?.length>0){
    const d=new Date(saved.savedAt);const ds=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const dc=Object.keys(saved.counts||{}).length;
    const offName=OFFICES.find(o=>o.key===saved.office)?.name||saved.office||'';
    resumeHtml=`<div class="resume-box"><div class="resume-title">途中保存データがあります</div><div class="resume-sub">${offName} / ${saved.date||''} / ${dc}件カウント済み</div><div class="resume-btns"><button class="rbtn-yes" id="ryes">続きから再開</button><button class="rbtn-no" id="rno">新しく始める</button></div></div>`;
  }
  const offBtns=OFFICES.map(o=>{
    const saved=loadOfficeData2(o.key);
    const dc=saved?Object.keys(saved.counts||{}).length:0;
    const total=saved?.allItems?.length||0;
    const badge=dc>0?`<span style="font-size:10px;color:var(--green);margin-top:2px;">✓ ${dc}/${total}件済み</span>`:'';
    return`<button class="office-btn ${o.cls}" data-key="${o.key}"><span class="office-icon">${o.icon}</span><span class="office-name">${o.name}</span>${badge}</button>`;
  }).join('');
  document.getElementById('app').innerHTML=`
    ${resumeHtml}
    <div class="card">
      <h2>営業所を選択</h2>
      <p class="sub">担当の営業所を選んでください。データは自動で読み込まれます。</p>
      <div class="office-grid">${offBtns}</div>
    </div>`;
  if(saved?.allItems?.length>0){
    document.getElementById('ryes').addEventListener('click',()=>resumeFromSave(saved));
    document.getElementById('rno').addEventListener('click',()=>{clearSave();renderOfficeSelect();});
  }
  document.querySelectorAll('.office-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentOffice=OFFICES.find(o=>o.key===btn.dataset.key);
      sob(currentOffice.name);
      // 保存済みデータがあれば読み込む
      const saved=loadOfficeData2(currentOffice.key);
      if(saved?.allItems?.length>0){
        currentDate=saved.date||'';sdb(currentDate);
        allItems=saved.allItems;counts=saved.counts||{};notes=saved.notes||{};
        const _cd=getOfficeCatDefs(currentOffice.key);
        const def=_cd.find(c=>c.key===saved.catKey);
        if(def){currentCatDef=def;currentCatItems=def.mixed?allItems.filter(it=>it.cat===def.label):allItems.filter(it=>it.cat===def.label&&it.status===def.status);}
        startSync();
        renderCatSelect();
        toast(`✓ ${currentOffice.name}の保存データを読み込みました`);
      } else {
        loadOfficeDataFromGitHub();
      }
    });
  });
}

function resumeFromSave(saved){
  currentOffice=OFFICES.find(o=>o.key===saved.office)||{key:saved.office,name:saved.office};
  sob(currentOffice.name);sdb(saved.date||'');
  allItems=saved.allItems;counts=saved.counts||{};notes=saved.notes||{};currentDate=saved.date||'';
  const _catDefs=getOfficeCatDefs(currentOffice.key);
  const def=_catDefs.find(c=>c.key===saved.catKey);
  if(def){currentCatDef=def;currentCatItems=def.mixed?allItems.filter(it=>it.cat===def.label):allItems.filter(it=>it.cat===def.label&&it.status===def.status);renderList();}
  else renderCatSelect();
}

// ===== GitHubからデータ読み込み =====
async function loadOfficeDataFromGitHub(){
  hs(`${currentOffice.name} — データ読み込み中...`);
  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="loading-box">
        <div class="loading-icon">⏳</div>
        <div class="loading-text">${currentOffice.name}のデータを取得しています...</div>
      </div>
    </div>`;
  sbb(false);
  try{
    const data=await fetchOfficeData(currentOffice.key);
    currentDate=data.date||'';sdb(currentDate);
    allItems=data.items||[];counts={};notes={};
    clearSave();
    startSync();
    renderCatSelect();
    toast(`✓ ${currentOffice.name}（${currentDate}）のデータを読み込みました`);
  }catch(err){
    document.getElementById('app').innerHTML=`
      <div class="card">
        <h2>データの読み込みに失敗</h2>
        <div class="err" style="margin-top:.75rem;">${err.message}</div>
        <button class="btn btn-ghost" id="bk">← 営業所選択に戻る</button>
      </div>`;
    document.getElementById('bk').addEventListener('click',renderOfficeSelect);
  }
}

// ===== 画面2：カテゴリ選択 =====
function renderCatSelect(){
  hs(`${currentOffice.name} — 担当を選択`);sp('',0,0);sbb(false);
  const cdm={};
  const activeCatDefs=getOfficeCatDefs(currentOffice.key);
  activeCatDefs.forEach(def=>{const its=def.mixed?allItems.filter(it=>it.cat===def.label):allItems.filter(it=>it.cat===def.label&&it.status===def.status);const dn=its.filter(it=>counts[allItems.indexOf(it)]!==undefined).length;cdm[def.key]={total:its.length,done:dn};});
  const bts=activeCatDefs.map(def=>{
    const{total,done}=cdm[def.key];if(total===0)return'';
    const dh=done>0?`<span class="cat-done">✓ ${done}/${total}件済み</span>`:`<span class="cat-count">${total}件</span>`;
    const hasCounts=done>0;
    const statusLabel=def.mixed?'新品・中古':def.status;
    return`<div style="position:relative;">
      <button class="cat-btn ${def.cc}" data-key="${def.key}"><span>${def.label}</span><span class="csb">${statusLabel}</span>${dh}</button>
      ${hasCounts?`<button class="cat-clear-btn" data-key="${def.key}" title="このカテゴリをクリア">🗑</button>`:''}
    </div>`;
  }).join('');
  document.getElementById('app').innerHTML=`
    <div class="card">
      <h2>${currentOffice.name} 担当を選択</h2>
      <p class="sub">${currentDate}　自分の担当カテゴリを選んでください</p>
      <div class="cat-grid">${bts}</div>
    </div>
    <button class="btn btn-ghost" id="bkoff">← 営業所選択に戻る</button>
    <button class="btn btn-ghost" id="reload">🔄 GitHubから再読み込み</button>`;
  document.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const def=activeCatDefs.find(d=>d.key===btn.dataset.key);
      currentCatDef=def;currentCatItems=def.mixed?allItems.filter(it=>it.cat===def.label):allItems.filter(it=>it.cat===def.label&&it.status===def.status);renderList();
    });
  });
  // カテゴリ個別クリアボタン
  document.querySelectorAll('.cat-clear-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const def=activeCatDefs.find(d=>d.key===btn.dataset.key);
      const tl2=def.mixed?`${def.label}（新品・中古）`:`${def.label}（${def.status}）`;
      if(!confirm(`「${tl2}」のカウントをクリアしますか？`))return;
      // そのカテゴリの商品だけカウントを削除
      const its=def.mixed?allItems.filter(it=>it.cat===def.label):allItems.filter(it=>it.cat===def.label&&it.status===def.status);
      its.forEach(it=>{const g=allItems.indexOf(it);delete counts[g];delete notes[g];});
      saveOfficeData(currentOffice.key,{office:currentOffice.key,date:currentDate,allItems,counts,notes,catKey:currentCatDef?.key,savedAt:new Date().toISOString()});
      const tl3=def.mixed?`${def.label}（新品・中古）`:`${def.label}（${def.status}）`;
      toast(`🗑 ${tl3}をクリアしました`);
      renderCatSelect();
    });
  });
  document.getElementById('bkoff').addEventListener('click',()=>{stopSync();renderOfficeSelect();});
  document.getElementById('reload').addEventListener('click',loadOfficeDataFromGitHub);
}

// ===== 画面3：商品一覧（引き表示） =====
function renderList(scrollToIdx=null){
  const def=currentCatDef;const items=currentCatItems;
  const tl=`${def.label}（${def.status}）`;
  const done=items.filter(it=>counts[allItems.indexOf(it)]!==undefined).length;
  hs(`${currentOffice.name} ${tl}`);sp(tl,done,items.length);sbb(true);
  sss('✓ 答え合わせのたびにスプレッドシートへ自動送信','ok');

  let html='<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;">';
  items.forEach((it,i)=>{
    const g=allItems.indexOf(it);const val=counts[g];const hv=val!==undefined;
    const diff=hv?val-it.core:null;const match=diff===0;
    let rc='list-row';let badge='<span class="list-pend">未入力</span>';
    if(hv){
      if(match){rc+=' done-ok';badge=`<span class="list-badge rok">⭕</span>`;}
      else if(diff>0){rc+=' done-over';badge=`<span class="list-badge rover">+${diff}</span>`;}
      else{rc+=' done-short';badge=`<span class="list-badge rshort">${diff}</span>`;}
    }
    html+=`<div class="${rc}" data-idx="${i}">
      <div class="list-num">${i+1}</div>
      <div class="list-name">
        <div class="list-item-name">${it.name}</div>
        <div class="list-item-meta">コア在庫: ${it.core}　品番: ${it.hinban}</div>
      </div>
      <div class="list-status">${badge}</div>
      <div class="list-arrow">›</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('app').innerHTML=html;

  document.querySelectorAll('.list-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const i=parseInt(row.dataset.idx);
      renderCountScreen(i);
    });
  });

  // カウントした商品の位置にスクロール
  if(scrollToIdx!==null){
    setTimeout(()=>{
      const target=document.querySelector(`[data-idx="${scrollToIdx}"]`);
      if(target)target.scrollIntoView({behavior:'smooth',block:'center'});
    },100);
  }

  document.getElementById('bb-back').onclick=renderCatSelect;
  document.getElementById('bb-save').onclick=()=>{saveP();syncToGAS(currentCatItems);};
  document.getElementById('bb-done').onclick=()=>{saveP();syncToGAS(currentCatItems);renderResult();};
}

// ===== 画面3b：カウント入力画面 =====
function renderCountScreen(idx){
  const items=currentCatItems;
  const it=items[idx];const g=allItems.indexOf(it);
  const val=counts[g];const hv=val!==undefined;
  const diff=hv?val-it.core:null;const match=diff===0;
  sp('',0,0);sbb(false);

  document.getElementById('app').innerHTML=`
    <div class="count-screen">
      <div class="count-back" id="cb-back">‹ 一覧に戻る</div>
      <div class="card" style="margin-bottom:1rem;">
        <div style="font-size:12px;color:var(--text3);margin-bottom:4px;">${idx+1} / ${items.length}</div>
        <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4;">${it.name}</div>
        <div style="display:flex;gap:12px;">
          <div style="font-size:12px;color:var(--text2);">品番：<span style="font-family:monospace;">${it.hinban}</span></div>
          <div style="font-size:12px;color:var(--text2);">コア在庫：<strong>${it.core}</strong></div>
        </div>
        ${hv?jiHtml(match,diff,it.core,val):''}
      </div>
      <div class="card">
        <input class="cnt-input" type="number" min="0" id="cnt-inp" value="${hv?val:''}" placeholder="0" inputmode="numeric">
        <div class="cbr" style="margin-top:10px;">
          <button class="cb minus" id="cb-minus">－</button>
          <button class="cb plus" id="cb-plus">＋</button>
        </div>
        <button class="ab${hv?'':' disabled'}" id="cb-ab">答え合わせする</button>
        <textarea class="note-input" id="cb-note" placeholder="メモ（任意）" rows="2" style="margin-top:8px;">${notes[g]||''}</textarea>
      </div>
      <div class="count-nav">
        <button id="cn-prev" ${idx===0?'disabled style="opacity:.3;"':''}>‹ 前へ</button>
        <button id="cn-next" ${idx===items.length-1?'disabled style="opacity:.3;"':''}>次へ ›</button>
      </div>
    </div>`;

  document.getElementById('cb-back').addEventListener('click',()=>{
    const def=currentCatDef;const tl=`${def.label}（${def.status}）`;
    const done=items.filter(it=>counts[allItems.indexOf(it)]!==undefined).length;
    hs(`${currentOffice.name} ${tl}`);sp(tl,done,items.length);sbb(true);
    sss('✓ 答え合わせのたびにスプレッドシートへ自動送信','ok');
    renderList();
  });

  const inp=document.getElementById('cnt-inp');
  inp.addEventListener('input',()=>{
    const b=document.getElementById('cb-ab');
    if(b)b.className='ab'+(inp.value!==''&&!isNaN(parseInt(inp.value))?'':' disabled');
  });

  document.getElementById('cb-minus').addEventListener('click',()=>{
    inp.value=String(Math.max(0,(parseInt(inp.value)||0)-1));inp.dispatchEvent(new Event('input'));
  });
  document.getElementById('cb-plus').addEventListener('click',()=>{
    inp.value=String((parseInt(inp.value)||0)+1);inp.dispatchEvent(new Event('input'));
  });

  document.getElementById('cb-ab').addEventListener('click',()=>{
    if(document.getElementById('cb-ab').classList.contains('disabled'))return;
    const v=parseInt(inp.value);if(isNaN(v))return;
    counts[g]=v;
    const nt=document.getElementById('cb-note');if(nt)notes[g]=nt.value||'';
    saveP();syncToGAS([it]);
    // 答え合わせ後に次の商品へ自動移動（最後の商品は一覧へ）
    if(idx<items.length-1){renderCountScreen(idx+1);}
    else{renderList(idx);}
  });

  document.getElementById('cn-prev')?.addEventListener('click',()=>{if(idx>0)renderCountScreen(idx-1);});
  document.getElementById('cn-next')?.addEventListener('click',()=>{if(idx<items.length-1)renderCountScreen(idx+1);});

  // 入力欄にフォーカス
  setTimeout(()=>inp.focus(),100);
}

function jiHtml(match,diff,core,real){
  if(match)return`<div class="ji ok"><span class="jm">⭕</span><span class="jt ok">差異なし（コア: ${core} ＝ 実在庫: ${real}）</span></div>`;
  if(diff>0)return`<div class="ji over"><span class="jm">❌</span><span class="jt over">実在庫が ${diff} 多い（コア: ${core} → 実: ${real}）</span></div>`;
  return`<div class="ji short"><span class="jm">❌</span><span class="jt short">実在庫が ${Math.abs(diff)} 少ない（コア: ${core} → 実: ${real}）</span></div>`;
}

function rcCard(i,it,val,g){
  const diff=val-it.core;const match=diff===0;const card=document.getElementById(`card-${i}`);if(!card)return;
  card.className='item-card'+(match?' counted':diff<0?' counted-diff':' counted');
  const ir=card.querySelector('.ir');if(ir){const o=ir.querySelector('.rb,.rpend');if(o)o.remove();const b=document.createElement('span');if(match){b.className='rb rok';b.textContent='⭕ 一致';}else if(diff>0){b.className='rb rover';b.textContent=`+${diff}`;}else{b.className='rb rshort';b.textContent=`${diff}`;}ir.appendChild(b);}
  const cv=document.getElementById(`cv-${i}`);if(cv)cv.classList.add('revealed');
  const area=document.getElementById(`ia-${i}`);const oj=area.querySelector('.ji');if(oj)oj.remove();
  const ab=document.getElementById(`ab-${i}`);if(ab)ab.insertAdjacentHTML('afterend',jiHtml(match,diff,it.core,val));
}

function upProg(){
  const done=currentCatItems.filter(it=>counts[allItems.indexOf(it)]!==undefined).length;
  sp(`${currentCatDef.label}（${currentCatDef.status}）`,done,currentCatItems.length);
}

// ===== 画面4：集計 =====
function renderResult(){
  const def=currentCatDef;const tl=`${def.label}（${def.status}）`;
  const counted=currentCatItems.map(it=>{const g=allItems.indexOf(it);return{...it,g,real:counts[g],diff:counts[g]!==undefined?counts[g]-it.core:null};}).filter(d=>d.diff!==null);
  const td=counted.reduce((s,d)=>s+d.diff,0);
  const mc=counted.filter(d=>d.diff===0).length;
  const si=counted.filter(d=>d.diff<0);const oi=counted.filter(d=>d.diff>0);
  const st=si.reduce((s,d)=>s+d.diff,0);const ot=oi.reduce((s,d)=>s+d.diff,0);
  const acc=counted.length>0?Math.round((mc/counted.length)*100):0;
  const dc=td===0?'green':td>0?'blue':'red';const ds=td>0?'+':'';
  hs(`${currentOffice.name} ${tl} 集計`);sp('',0,0);sbb(false);
  const tr=currentCatItems.map(it=>{
    const g=allItems.indexOf(it);const r=counts[g]!==undefined?counts[g]:null;const d=r!==null?r-it.core:null;const m=d===0;
    const rc2=d===null?'':m?'rok':d>0?'rov':'rsh';
    const db=d!==null?`<span class="db ${m?'dok':d>0?'dover':'dshort'}">${d>0?'+':''}${d}</span>`:'<span style="color:var(--text3);font-size:11px;">未入力</span>';
    return`<tr class="${rc2}"><td>${it.name}</td><td style="text-align:center;">${it.core}</td><td style="text-align:center;">${r!==null?r:'—'}</td><td style="text-align:center;">${db}</td></tr>`;
  }).join('');
  document.getElementById('app').innerHTML=`
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:.75rem;">${currentOffice.name} ${tl}</div>
      <div class="mg">
        <div class="mc"><div class="mv ${dc}">${ds}${td}</div><div class="ml">総差異</div></div>
        <div class="mc"><div class="mv red">${si.length}</div><div class="ml">不足商品数</div></div>
        <div class="mc"><div class="mv blue">${oi.length}</div><div class="ml">超過商品数</div></div>
        <div class="mc"><div class="mv ${acc===100?'green':''}">${acc}%</div><div class="ml">一致率</div></div>
        <div class="mc"><div class="mv red">${st}</div><div class="ml">不足合計</div></div>
        <div class="mc"><div class="mv blue">+${ot}</div><div class="ml">超過合計</div></div>
      </div>
      <div class="ok-box" style="margin-bottom:.75rem;">✓ スプレッドシートに自動送信済みです</div>
      <div class="stw"><table class="st"><thead><tr><th>商品名</th><th>コア在庫</th><th>実在庫</th><th>差異</th></tr></thead><tbody>${tr}</tbody></table></div>
    </div>
    <button class="btn btn-ghost" id="bkl">← カウントに戻る</button>
    <button class="btn btn-ghost" id="bkc">別の担当をカウントする</button>
    <button class="btn btn-ghost" id="bkoff">別の営業所に切り替える</button>`;
  document.getElementById('bkl').addEventListener('click',renderList);
  document.getElementById('bkc').addEventListener('click',renderCatSelect);
  document.getElementById('bkoff').addEventListener('click',renderOfficeSelect);
}

renderOfficeSelect();
</script>
</body>
</html>
